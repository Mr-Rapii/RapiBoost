<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RaffiBoost</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}
.box{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  max-width:450px;
  margin:auto;
}
input,button{
  width:90%;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:8px;
}
.task{
  background:#334155;
  margin-top:10px;
  padding:12px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="loginBox">

<h1>🚀 RaffiBoost</h1>

<div class="box">

<input id="username" placeholder="Masukkan Username">

<button onclick="registerUser()">Register</button>
<button onclick="loginUser()">Login</button>

<p id="status"></p>

</div>

</div>


<div id="dashboard" style="display:none;">

<h2>Dashboard</h2>

<p>👤 <span id="currentUser"></span></p>

<p>🪙 Coin: <span id="coinShow"></span></p>

<hr>

<h3>Buat Campaign</h3>

<input id="accountInput"
placeholder="@username target">

<input id="targetInput"
placeholder="Jumlah followers">

<button onclick="createCampaign()">

Submit Campaign

</button>

<hr>

<h3>Task Tersedia</h3>

<div id="taskList">

Loading...

</div>

</div>


<script>

/* CONFIG */
const SUPABASE_URL =
"https://kbjevwmihxlgcarhyvje.supabase.co";

const SUPABASE_KEY =
"sb_publishable_aFgPoAkjq2aY_mwk94hQqw_cP5iYb7D";

const db = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

let loggedUser="";


/* REGISTER */
async function registerUser(){

 let username =
 document.getElementById("username").value;

 let { error } =
 await db.from("users").insert([
   {
     username:username,
     coin:1
   }
 ]);

 if(error){

   document.getElementById("status").innerText=
   error.message;

 }else{

   document.getElementById("status").innerText=
   "Register berhasil";
 }
}


/* LOGIN */
async function loginUser(){

 let username =
 document.getElementById("username").value;

 let { data } =
 await db.from("users")
 .select("*")
 .eq("username",username);

 if(data.length==0){

   document.getElementById("status").innerText=
   "User tidak ditemukan";

   return;
 }

 loggedUser=username;

 document.getElementById("loginBox")
 .style.display="none";

 document.getElementById("dashboard")
 .style.display="block";

 document.getElementById("currentUser")
 .innerText=username;

 document.getElementById("coinShow")
 .innerText=data[0].coin;

 loadTasks();
}


/* CREATE CAMPAIGN */
async function createCampaign(){

 let account=
 document.getElementById("accountInput").value;

 let target=
 parseInt(
 document.getElementById("targetInput").value
 );

 await db.from("campaigns").insert([
   {
     username:loggedUser,
     account:account,
     target:target
   }
 ]);

 alert("Campaign dibuat");

 loadTasks();
}


/* LOAD TASK */
async function loadTasks(){

 let { data } =
 await db.from("campaigns")
 .select("*");

 let html="";

 data.forEach(item=>{

   if(item.username!=loggedUser){

     html+=`

     <div class="task">

     <p>Follow ${item.account}</p>

     <button
     onclick="doTask()">

     Sudah Follow (+1 Coin)

     </button>

     </div>

     `;
   }

 });

 document.getElementById("taskList")
 .innerHTML=html;
}


/* KERJAKAN TASK */
async function doTask(){

 let { data }=
 await db.from("users")
 .select("*")
 .eq("username",loggedUser);

 let coin=data[0].coin+1;

 await db.from("users")
 .update({coin:coin})
 .eq("username",loggedUser);

 document.getElementById("coinShow")
 .innerText=coin;

 alert("Coin bertambah +1");
}

</script>

</body>
</html>
