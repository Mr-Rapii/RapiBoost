<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RapiBoost</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding:20px;
}
.box{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  max-width:400px;
  margin:auto;
}
input,button{
  width:90%;
  padding:12px;
  margin:8px;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>🚀 RapiBoost</h1>

<div class="box">

<input id="username" placeholder="Masukkan Username">

<button onclick="registerUser()">Register</button>

<button onclick="checkUser()">Login</button>

<p id="status"></p>

</div>

<script>

/* GANTI DENGAN DATA KAMU */
const SUPABASE_URL =
"https://kbjevwmihxlgcarhyvje.supabase.co";

const SUPABASE_KEY =
"sb_publishable_aFgPoAkjq2aY_mwk94hQqw_cP5iYb7D";

const db = supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);


/* REGISTER */
async function registerUser(){

 let username =
 document.getElementById("username").value;

 if(!username){
   alert("Isi username");
   return;
 }

 let { error } =
 await db.from("users").insert([
   {
     username: username,
     coin: 1
   }
 ]);

 if(error){

   document.getElementById("status").innerText =
   "Error: " + error.message;

 } else {

   document.getElementById("status").innerText =
   "Register berhasil, coin awal 1";
 }
}


/* LOGIN */
async function checkUser(){

 let username =
 document.getElementById("username").value;

 let { data, error } =
 await db.from("users")
 .select("*")
 .eq("username", username);

 if(error){

   document.getElementById("status").innerText =
   "Error login";

   return;
 }

 if(data.length==0){

   document.getElementById("status").innerText =
   "User tidak ditemukan";

 } else {

   document.getElementById("status").innerText =
   "Login berhasil | Coin: " + data[0].coin;
 }
}

</script>

</body>
</html>
