<!DOCTYPE html>
<html>
<head>
<title>RaffiBoost</title>

<style>
body{
 background:#0f172a;
 color:white;
 font-family:Arial;
 text-align:center;
 padding:30px;
}

.box{
 background:#1e293b;
 padding:20px;
 border-radius:10px;
 max-width:400px;
 margin:auto;
}

input,button{
 width:90%;
 padding:10px;
 margin:8px;
 border:none;
 border-radius:8px;
}

.task{
 background:#334155;
 padding:10px;
 margin-top:15px;
 border-radius:10px;
}
</style>
</head>

<body>

<div id="loginPage">

<h1>🚀 RaffiBoost</h1>

<div class="box">
<input id="username" placeholder="Username">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="status"></p>
</div>

</div>


<div id="dashboard" style="display:none;">

<h1>Dashboard</h1>

<p>👤 User: <span id="userShow"></span></p>

<p>🪙 Coin: <span id="coinShow"></span></p>

<div class="task">
<h3>Task #1</h3>

<p>Follow akun @contoh_account</p>

<button onclick="doneTask()">Sudah Follow (+1 coin)</button>
</div>

<br>

<button onclick="logout()">Logout</button>

</div>


<script>

function register(){
 let user=document.getElementById("username").value;

 if(user=="") return;

 localStorage.setItem("user",user);
 localStorage.setItem("coin",1);

 document.getElementById("status").innerText=
 "Akun dibuat | Coin awal 1";
}

function login(){
 let user=localStorage.getItem("user");

 if(!user){
  document.getElementById("status").innerText=
  "Daftar dulu";
  return;
 }

 openDashboard();
}

function openDashboard(){
 let user=localStorage.getItem("user");
 let coin=localStorage.getItem("coin");

 document.getElementById("loginPage").style.display="none";
 document.getElementById("dashboard").style.display="block";

 document.getElementById("userShow").innerText=user;
 document.getElementById("coinShow").innerText=coin;
}

function doneTask(){
 let coin=parseInt(localStorage.getItem("coin"));

 coin=coin+1;

 localStorage.setItem("coin",coin);

 document.getElementById("coinShow").innerText=coin;

 alert("Berhasil! +1 coin");
}

function logout(){
 location.reload();
}

</script>

</body>
</html>
